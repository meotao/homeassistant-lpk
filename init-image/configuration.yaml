# Home Assistant 默认配置
# 为懒猫微服反向代理（lzc-ingress）配置信任
default_config:

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1
    - ::1
    - 172.16.0.0/12   # Docker 默认内部网段，覆盖 lzc-ingress
    - 192.168.0.0/16  # 局域网段
    - 10.0.0.0/8      # 其他内部网段

homeassistant:
  time_zone: Asia/Shanghai

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
